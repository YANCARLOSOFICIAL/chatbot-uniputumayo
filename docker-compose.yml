services:
  # ── Base de datos PostgreSQL con pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: iup-chatbot-db
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_password
      POSTGRES_DB: chatbot_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-net

  # ── Redis (RAG cache persistente) ──
  redis:
    image: redis:7-alpine
    container_name: iup-chatbot-redis
    # No persistence to disk — pure memory cache. Evict LRU when full.
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (LLM local) ──
  ollama:
    image: ollama/ollama:latest
    container_name: iup-chatbot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # GPU passthrough probado y descartado para este hardware: la RTX 3050 local
    # solo tiene 4GB VRAM, insuficiente para qwen3:8b (6.5GB) — Ollama termina
    # desalojando/recargando los modelos de embedding constantemente peleando por
    # ese espacio, y medido con el eval harness NO mejoró la latencia (de hecho
    # el retrieval empeoró). Además, reservar una GPU aquí haría que el contenedor
    # de Ollama fallara al arrancar en el servidor de producción (sin GPU). Ver
    # docker-compose.gpu.yml si se quiere probar en una máquina con más VRAM.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - chatbot-net

  # ── Backend FastAPI ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iup-chatbot-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://chatbot_user:chatbot_password@postgres:5432/chatbot_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: qwen3:8b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_VISION_MODEL: gemma4:e4b
      OLLAMA_KEEP_ALIVE: "30m"
      OLLAMA_NUM_CTX: "8192"
      OLLAMA_THINK_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_DEFAULT_MODEL: gpt-5.4-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      DEFAULT_LLM_PROVIDER: ollama
      DEFAULT_TEMPERATURE: "0.05"
      DEFAULT_MAX_TOKENS: "2048"
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "77"
      RAG_TOP_K: "10"
      RAG_SCORE_THRESHOLD: "0.35"
      RAG_CANDIDATES_MULTIPLIER: "3"
      RAG_HYDE_ENABLED: "true"
      RAG_DIVERSITY_ENABLED: "true"
      VERIFICATION_LOOP_ENABLED: "true"
      VERIFICATION_MAX_ATTEMPTS: "2"
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_DIMENSIONS: "768"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:80,http://localhost"
      MAX_UPLOAD_SIZE_MB: "50"
      UPLOAD_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@iup.edu.co}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      # Whisper "small" (~500MB) downloads from Hugging Face on first STT
      # request; without this volume it re-downloads on every container
      # recreate (each deploy), stalling the first fallback-STT request ~100s.
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - chatbot-net

  # ── Frontend Next.js ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL="" → browser uses relative /api/* URLs (proxied by nginx or by the rewrite below)
        NEXT_PUBLIC_API_URL: ""
        # INTERNAL_API_URL → where Next.js server proxies /api/* when no nginx is in front
        # Uses docker-internal hostname so the rewrite works when accessing port 3001 directly
        INTERNAL_API_URL: "http://backend:8000"
    container_name: iup-chatbot-frontend
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - chatbot-net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: iup-chatbot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - chatbot-net

volumes:
  pgdata:
  ollama_data:
  uploads_data:
  whisper_cache:

networks:
  chatbot-net:
    driver: bridge
