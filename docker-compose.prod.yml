name: chatbotuniputumayo

services:
  # ── Base de datos PostgreSQL con pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: iup-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_password
      POSTGRES_DB: chatbot_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - chatbot-net

  # ── Redis (RAG cache persistente) ──
  redis:
    image: redis:7-alpine
    container_name: iup-chatbot-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    # No port mapping in prod — only accessible within the docker network
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Ollama (LLM local) ──
  ollama:
    image: ollama/ollama:latest
    container_name: iup-chatbot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 8G
    networks:
      - chatbot-net

  # ── Backend FastAPI ──
  backend:
    image: yancarlos45/iup-chatbot-backend:latest
    container_name: iup-chatbot-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://chatbot_user:chatbot_password@postgres:5432/chatbot_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: qwen3:8b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_VISION_MODEL: gemma4:e4b
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_DEFAULT_MODEL: gpt-5.4-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      DEFAULT_LLM_PROVIDER: ollama
      DEFAULT_TEMPERATURE: "0.05"
      DEFAULT_MAX_TOKENS: "2048"
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "77"
      RAG_TOP_K: "5"
      RAG_SCORE_THRESHOLD: "0.35"
      RAG_HYDE_ENABLED: "true"
      RAG_DIVERSITY_ENABLED: "true"
      RAG_CANDIDATES_MULTIPLIER: "3"
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_DIMENSIONS: "768"
      CORS_ORIGINS: "*"
      MAX_UPLOAD_SIZE_MB: "50"
      UPLOAD_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@iup.edu.co}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8001:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - chatbot-net

  # ── Frontend Next.js ──
  frontend:
    image: yancarlos45/iup-chatbot-frontend:latest
    container_name: iup-chatbot-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - chatbot-net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: yancarlos45/iup-chatbot-nginx:latest
    container_name: iup-chatbot-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - chatbot-net

volumes:
  pgdata:
  ollama_data:
  uploads_data:

networks:
  chatbot-net:
    driver: bridge
