name: chatbotuniputumayo

services:
  # ── Base de datos PostgreSQL con pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: iup-chatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_password
      POSTGRES_DB: chatbot_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - chatbot-net

  # ── Redis (RAG cache persistente) ──
  redis:
    image: redis:7-alpine
    container_name: iup-chatbot-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    # No port mapping in prod — only accessible within the docker network
    networks:
      - chatbot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Ollama (LLM local) ──
  ollama:
    image: ollama/ollama:latest
    container_name: iup-chatbot-ollama
    restart: unless-stopped
    environment:
      # CPU sin AVX2 (Xeon E5-2670 v2): recargar un modelo desde disco cuesta
      # ~18s. Mantenerlo en memoria más tiempo evita pagar ese costo en cada
      # mensaje tras 5 min de inactividad (default de Ollama).
      OLLAMA_KEEP_ALIVE: "30m"
      # Sin esto, Ollama usa su default de 2048 tokens para TODO el prompt
      # (system + contexto RAG + historial) y trunca el resto en silencio.
      OLLAMA_NUM_CTX: "8192"
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 8G
    networks:
      - chatbot-net

  # ── Backend FastAPI ──
  backend:
    image: yancarlos45/iup-chatbot-backend:latest
    container_name: iup-chatbot-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://chatbot_user:chatbot_password@postgres:5432/chatbot_db
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: qwen3:8b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_VISION_MODEL: gemma4:e4b
      # qwen3:8b es un modelo híbrido de razonamiento: sin esto genera un bloque
      # <think>...</think> largo antes de la respuesta visible, que se descartaba
      # DESPUÉS de generarlo (pagando el costo completo en tiempo real). En este
      # CPU sin AVX2 esto era, medido en un caso, la diferencia entre responder
      # y morir en el timeout de 300s.
      OLLAMA_THINK_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_DEFAULT_MODEL: gpt-5.4-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      DEFAULT_LLM_PROVIDER: ollama
      DEFAULT_TEMPERATURE: "0.05"
      # 768 causaba respuestas cortadas a media palabra en preguntas que
      # legítimamente necesitan más tokens (planes de estudio completos,
      # explicaciones largas) — confirmado con done_reason="length" en la
      # respuesta cruda de Ollama. 1536 es un punto medio: este CPU sin AVX2
      # sigue siendo lento, pero OLLAMA_THINK_ENABLED=false ya elimina el
      # gasto de tokens en razonamiento oculto, dejando margen para esto.
      DEFAULT_MAX_TOKENS: "1536"
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "77"
      # Was 5 — too small for curriculum documents with many semesters:
      # measured live that "décimo semestre" never retrieved its own chunk
      # at top_k=5 no matter how high max_per_doc went (see rag_service.py's
      # _apply_diversity, now max_per_doc=10 to match). Doubling top_k also
      # doubles how much context the LLM has to process per answer — on this
      # CPU-without-AVX2 host that's already tuned close to the 300s
      # timeout (see OLLAMA_THINK_ENABLED/RAG_HYDE_ENABLED below), so if
      # prod logs start showing responses near that timeout after this
      # change, dropping back toward 5-7 here is the first thing to try.
      RAG_TOP_K: "10"
      RAG_SCORE_THRESHOLD: "0.35"
      # Reactivado en prod (2026-07-21): el razonamiento original de dejarlo
      # en "false" asumía que HyDE siempre pega contra Ollama — cierto cuando
      # DEFAULT_LLM_PROVIDER era ollama, pero _generate_hyde_doc (rag_service.py)
      # en realidad usa runtime_config.default_llm_provider, el proveedor de
      # chat ACTIVO en runtime (persistido en BD vía /admin), no este env var.
      # Con OpenAI activo (caso actual en prod) esa llamada extra va a OpenAI,
      # no a Ollama — no compite por el timeout de 300s. Y aunque un admin
      # vuelva a poner Ollama como proveedor activo, rag_service.py ya
      # desactiva HyDE solo en ese caso (`hyde_active = rag_hyde_enabled and
      # default_llm_provider != "ollama"`), así que este flag no puede
      # reintroducir la doble carga sobre Ollama que motivó el "false"
      # original. Confirmado en vivo: con HyDE apagado, la pregunta "cuales
      # son los requisitos de admision?" traía el chunk equivocado del
      # Estatuto Estudiantil (el de "SELECCIÓN Y ADMISIÓN", genérico) en vez
      # del que realmente lista los requisitos (bajo "DE LA INSCRIPCIÓN") —
      # la query cruda empata más con el título de capítulo que con el
      # contenido. HyDE corrige esto embediendo una respuesta hipotética en
      # vez de la pregunta literal.
      RAG_HYDE_ENABLED: "true"
      RAG_DIVERSITY_ENABLED: "true"
      RAG_CANDIDATES_MULTIPLIER: "3"
      # Habilitado, pero sin reintento (1 intento = genera + revisa, nunca
      # regenera): un reintento completo duplica el costo de un generate() ya
      # medido como caro en este CPU sin AVX2 (ver OLLAMA_THINK_ENABLED /
      # RAG_HYDE_ENABLED arriba, misma razón). Subir a "2" solo después de
      # confirmar en logs de prod que hay margen real bajo el timeout de 300s.
      VERIFICATION_LOOP_ENABLED: "true"
      VERIFICATION_MAX_ATTEMPTS: "1"
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_DIMENSIONS: "768"
      CORS_ORIGINS: "*"
      MAX_UPLOAD_SIZE_MB: "50"
      UPLOAD_DIR: /app/uploads
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@iup.edu.co}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8001:8000"
    volumes:
      - uploads_data:/app/uploads
      # Whisper "small" (~500MB) downloads from Hugging Face on first STT
      # fallback request. The deploy step below runs `up --force-recreate`
      # on every push to main, so without this volume that ~100s download
      # would repeat on every single deploy instead of just the first one.
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - chatbot-net

  # ── Frontend Next.js ──
  frontend:
    image: yancarlos45/iup-chatbot-frontend:latest
    container_name: iup-chatbot-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - chatbot-net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: yancarlos45/iup-chatbot-nginx:latest
    container_name: iup-chatbot-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - chatbot-net

volumes:
  pgdata:
  ollama_data:
  uploads_data:
  whisper_cache:

networks:
  chatbot-net:
    driver: bridge
