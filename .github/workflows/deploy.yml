name: Build, Push & Deploy

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: yancarlos45/iup-chatbot-backend
  FRONTEND_IMAGE: yancarlos45/iup-chatbot-frontend
  NGINX_IMAGE: yancarlos45/iup-chatbot-nginx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - service: backend
            image: yancarlos45/iup-chatbot-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            image: yancarlos45/iup-chatbot-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: nginx
            image: yancarlos45/iup-chatbot-nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', secrets.NEXT_PUBLIC_API_URL) || '' }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Pull latest images
        run: |
          docker pull yancarlos45/iup-chatbot-backend:latest
          docker pull yancarlos45/iup-chatbot-frontend:latest
          docker pull yancarlos45/iup-chatbot-nginx:latest

      - name: Restart containers
        run: |
          docker restart chatbotuniputumayo-backend-1
          docker restart chatbotuniputumayo-frontend-1
          docker restart chatbotuniputumayo-nginx-1

      - name: Verify containers are running
        run: |
          docker ps --filter "name=chatbotuniputumayo" --format "table {{.Names}}\t{{.Status}}"
