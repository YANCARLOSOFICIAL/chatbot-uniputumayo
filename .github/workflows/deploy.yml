name: Build, Push & Deploy

on:
  push:
    branches:
      - main

env:
  BACKEND_IMAGE: yancarlos45/iup-chatbot-backend
  FRONTEND_IMAGE: yancarlos45/iup-chatbot-frontend
  NGINX_IMAGE: yancarlos45/iup-chatbot-nginx

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - service: backend
            image: yancarlos45/iup-chatbot-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            image: yancarlos45/iup-chatbot-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: nginx
            image: yancarlos45/iup-chatbot-nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', secrets.NEXT_PUBLIC_API_URL) || '' }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cleanup old containers
        run: |
          docker compose -f docker-compose.prod.yml down --remove-orphans --volumes=false || true
          docker rm -f chatbotuniputumayo-backend-1 chatbotuniputumayo-frontend-1 chatbotuniputumayo-postgres-1 chatbotuniputumayo-nginx-1 chatbotuniputumayo-ollama-1 2>/dev/null || true
          docker rm -f iup-chatbot-backend iup-chatbot-frontend iup-chatbot-db iup-chatbot-nginx iup-chatbot-ollama 2>/dev/null || true
          docker container prune -f || true

      - name: Deploy with docker compose
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --force-recreate

      - name: Wait for Ollama to be ready
        run: |
          echo "Esperando a que Ollama esté listo..."
          for i in $(seq 1 30); do
            if docker exec iup-chatbot-ollama ollama list > /dev/null 2>&1; then
              echo "Ollama listo!"
              break
            fi
            echo "Intento $i/30... esperando 5s"
            sleep 5
          done

      - name: Pull Ollama models (si no existen)
        run: |
          echo "Verificando modelos de Ollama..."

          pull_if_missing() {
            local model="$1"
            local label="$2"
            if docker exec iup-chatbot-ollama ollama list | grep -q "^${model}"; then
              echo "✓ $label ya existe: $model"
            else
              echo "⬇ Descargando $label: $model"
              docker exec iup-chatbot-ollama ollama pull "$model"
            fi
          }

          pull_if_missing "qwen3:8b"          "chat"
          pull_if_missing "nomic-embed-text"  "embeddings"
          pull_if_missing "gemma4:e4b"        "visión"

          echo ""
          echo "Modelos disponibles:"
          docker exec iup-chatbot-ollama ollama list

      - name: Verify containers are running
        run: |
          echo "Estado de los contenedores:"
          docker ps --filter "name=iup-chatbot" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
