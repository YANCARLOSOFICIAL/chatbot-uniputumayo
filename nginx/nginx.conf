upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # Desactivar timeout global generoso para Ollama en CPU
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE streaming endpoints (must be before /api/ to match first)
    location ~* /api/v1/chat/conversations/.*/messages/stream {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers críticos para SSE
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept 'text/event-stream';

        # Timeouts largos: Ollama en CPU puede tardar minutos
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;

        # Desactivar todo tipo de buffering para SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;

        # Desactivar compresión gzip en SSE (causa problemas)
        gzip off;

        # Evitar que Nginx cierre conexiones idle
        keepalive_timeout 0;

        # Prevenir que browsers/CDN usen QUIC/HTTP3 en SSE.
        # Conexiones SSE de larga duración sobre QUIC causan ERR_QUIC_PROTOCOL_ERROR
        # cuando Ollama tarda > 20 s en emitir el primer token.
        add_header Alt-Svc 'clear' always;
        add_header Cache-Control 'no-store' always;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        client_max_body_size 50M;

        # Prevenir QUIC en uploads y otras llamadas API que pueden ser lentas.
        # Los errores QUIC previos pueden causar que Cloudflare devuelva 529
        # en requests posteriores (protección "origin overloaded").
        add_header Alt-Svc 'clear' always;
    }

    # Backend docs (Swagger)
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
}
